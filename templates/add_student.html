{% extends 'base.html' %}
{% block title %}Add Student{% endblock %}
{% block content %}
<div class="card">
    <h2>Add New Student</h2>
    <form method="POST">
        <div class="form-group"><label>Roll Number *</label>
            <input type="text" name="roll_no" required></div>
        <div class="form-group"><label>Full Name *</label>
            <input type="text" name="name" required></div>
        <div class="form-group"><label>Age *</label>
            <input type="number" name="age" required min="1" max="120"></div>
        <div class="form-group"><label>Course *</label>
            <input type="text" name="course" required></div>
        <div class="form-group"><label>Email</label>
            <input type="email" name="email"></div>
        <button type="submit" class="btn btn-success">Add Student</button>
        <a href="{{ url_for('list_students') }}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
